<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Hermosa Flor</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
   .flower {
      position: relative;
      transform-style: preserve-3d;
      z-index: 2;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="flower"></div>
  
  <script>
console.clear();

var doc = document;
var flower = doc.querySelector('.flower');

var petalPartMarkup = '<div class="box"> \
    <div class="shape"></div> \
    </div>';
var maxParts = 20;
var maxPetals = 6;

createFlower();

function createFlower () {
    var angle = 360 / maxPetals;
    for (var i = 0; i < maxPetals; i++) {
        var petal = createPetal();
        var currAngle = angle * i + 'deg';
        petal.style.transform = 'rotateY(' + currAngle + ') rotateX(-30deg)';
        flower.appendChild(petal);
    }
}

function createPetal() {
    var petal = document.createElement('div');
    petal.innerHTML = petalPartMarkup;
    return petal;
}

// Estrellas de fondo
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

var stars = [];
for (var i = 0; i < 120; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.5,
        dx: (Math.random() - 0.5) * 0.7,
        dy: (Math.random() - 0.5) * 0.7,
        alpha: Math.random() * 0.5 + 0.5
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        ctx.save();
        ctx.globalAlpha = s.alpha;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,182,193,0.9)';
        ctx.shadowColor = '#ffb6d5';
        ctx.shadowBlur = 2;
        ctx.fill();
        ctx.restore();
        s.x += s.dx;
        s.y += s.dy;
        if (s.x < 0 || s.x > canvas.width) s.dx *= -1;
        if (s.y < 0 || s.y > canvas.height) s.dy *= -1;
    }
    requestAnimationFrame(animate);
}
animate();
  </script>
</body>
</html>
